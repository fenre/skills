[streamfwd://streamfwd]
# Cloud search-tier Stream app URL. Use the externally reachable FQDN that hosts
# splunk_app_stream on Splunk Cloud.
splunk_stream_app_location = https://<stream-search-head-fqdn>:443/en-us/custom/splunk_app_stream/

# Use a stable identifier for this heavy forwarder so Stream groups can target it.
stream_forwarder_id = <hf-identifier>

# Keep certificate validation enabled for the Cloud control-plane connection.
sslVerifyServerCert = true
rootCA = <absolute-path-to-root-ca.pem>

# Optional: pin the expected certificate common name if your deployment needs it.
# sslCommonNameToCheck = <stream-search-head-fqdn>

disabled = 0
source = stream
