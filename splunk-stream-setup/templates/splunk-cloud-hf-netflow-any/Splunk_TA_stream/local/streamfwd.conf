[streamfwd]
# Keep the internal stats/config endpoint loopback-only on the heavy forwarder.
ipAddr = 127.0.0.1
port = 8889

# NetFlow/IPFIX receiver:
# - 0.0.0.0 means listen on all interfaces
# - no filter is set, so any device may send NetFlow/IPFIX
netflowReceiver.0.ip = 0.0.0.0
netflowReceiver.0.port = 9995
netflowReceiver.0.decoder = netflow

# Optional tuning:
# netflowReceiver.0.decodingThreads = 2

# Optional restriction example if you later want to limit senders:
# netflowReceiver.0.filter = host 10.10.10.10 or host 10.10.10.11
