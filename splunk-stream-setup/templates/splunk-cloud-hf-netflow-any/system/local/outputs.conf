[tcpout]
defaultGroup = splunkcloud_stream_netflow
indexAndForward = false
forwardedindex.filter.disable = true

[tcpout:splunkcloud_stream_netflow]
# Replace with the forwarding endpoint(s) from your Splunk Cloud deployment.
server = <cloud-forwarder-endpoint-1>:9997,<cloud-forwarder-endpoint-2>:9997
compressed = true

# Optional: if your Splunk Cloud deployment requires a specific forwarder-side
# certificate file, uncomment and adjust this path.
# sslCertPath = $SPLUNK_HOME/etc/auth/splunkclouduf.splunkcloud.com.pem
