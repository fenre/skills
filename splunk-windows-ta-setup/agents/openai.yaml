interface:
  display_name: "Splunk Add-on for Microsoft Windows Setup"
  short_description: "Render WinEventLog/Perfmon inputs, indexes, and CIM placement"
  default_prompt: >-
    Use $splunk-windows-ta-setup to render Splunk_TA_windows inputs.conf
    overlays for WinEventLog, Perfmon, and WinHostMon, install the add-on,
    create the wineventlog and perfmon indexes, and validate Windows data and
    CIM readiness.
