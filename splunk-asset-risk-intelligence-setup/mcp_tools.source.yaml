name: Splunk Asset Risk Intelligence MCP Tools
description: Read-only MCP tools for Splunk Asset and Risk Intelligence readiness validation.
version: 1.0.0
author: splunk-asset-risk-intelligence-setup skill
external_app_id: ari
tools:
  - id: app_health
    title: ARI App Health
    description: Check ARI app installation, visibility, configured state, and version.
    tags: [ari, asset, risk, health]
    time_range: false
    row_limiter: true
    spl: |
      | rest /services/apps/local count=0 | search title=SplunkAssetRiskIntelligence OR title=Splunk_TA_ARI OR title=TA-ari* | table title label version disabled visible configured state | sort title
    examples: [Check ARI app health]
  - id: required_indexes
    title: ARI Required Indexes
    description: Check required ARI indexes and basic storage/event counters.
    tags: [ari, indexes]
    time_range: false
    row_limiter: true
    spl: |
      | rest /services/data/indexes count=0 | search title=ari_staging OR title=ari_asset OR title=ari_internal OR title=ari_ta | table title disabled datatype totalEventCount currentDBSizeMB maxTotalDataSizeMB splunk_server | sort title
    examples: [List ARI required indexes]
  - id: kvstore_status
    title: ARI KV Store Readiness
    description: Show platform KV Store status and ARI-owned collection definitions.
    tags: [ari, kvstore]
    time_range: false
    row_limiter: true
    spl: |
      | rest /services/server/info | eval check="platform_status", collection="", app="", accelerated_fields="", replicate="", kv_status=kvStoreStatus, kv_version=kvStoreVersion | table check serverName kv_status kv_version collection app accelerated_fields replicate | append [| rest /servicesNS/nobody/-/storage/collections/config count=0 | search eai:acl.app=SplunkAssetRiskIntelligence OR title=ari* | eval check="collection", serverName="", kv_status="", kv_version="", collection=title, app='eai:acl.app' | table check serverName kv_status kv_version collection app accelerated_fields replicate] | sort check app collection
    examples: [Check ARI KV collections]
  - id: roles_capabilities
    title: ARI Roles And Capabilities
    description: Inventory roles and capabilities that appear to be ARI-related.
    tags: [ari, roles, capabilities]
    time_range: false
    row_limiter: true
    spl: |
      | rest /services/authorization/roles count=0 | search title=ari* OR imported_roles=ari* OR capabilities=ari* | table title imported_roles capabilities srchIndexesAllowed srchIndexesDefault | sort title
    examples: [Show ARI roles and capabilities]
  - id: saved_searches
    title: ARI Saved Search Inventory
    description: List ARI-owned saved searches and scheduling state.
    tags: [ari, savedsearches]
    time_range: false
    row_limiter: true
    spl: |
      | rest /servicesNS/nobody/-/saved/searches count=0 | search eai:acl.app=SplunkAssetRiskIntelligence OR title=ari* | table title eai:acl.app disabled is_scheduled cron_schedule next_scheduled_time | sort title
    examples: [List ARI saved searches]
  - id: ari_ta_data
    title: ARI TA Data Visibility
    description: Summarize recent ARI technical add-on data.
    tags: [ari, data, ari_ta]
    time_range: true
    row_limiter: true
    spl: |
      | tstats count latest(_time) as latest where index=ari_ta by index sourcetype host | eval latest=strftime(latest,"%Y-%m-%dT%H:%M:%SZ") | sort -count
    examples: [Show recent ari_ta data]
  - id: exposure_analytics_readiness
    title: ARI ES Exposure Analytics Readiness
    description: Check ES and ARI app presence needed for Exposure Analytics handoff readiness.
    tags: [ari, es, exposure_analytics]
    time_range: false
    row_limiter: true
    spl: |
      | rest /services/apps/local count=0 | search title=SplunkAssetRiskIntelligence OR title=SplunkEnterpriseSecuritySuite OR title=MissionControl | table title version disabled visible configured | sort title
    examples: [Check ARI Exposure Analytics readiness]
coverage:
  - id: ari_app_health
    status: mcp_tool
    tool: app_health
  - id: ari_required_indexes
    status: mcp_tool
    tool: required_indexes
  - id: ari_kv_store
    status: mcp_tool
    tool: kvstore_status
  - id: ari_roles_capabilities
    status: mcp_tool
    tool: roles_capabilities
  - id: ari_app_saved_searches
    status: mcp_tool
    tool: saved_searches
  - id: ari_ta_data
    status: mcp_tool
    tool: ari_ta_data
  - id: ari_es_exposure_analytics_readiness
    status: mcp_tool
    tool: exposure_analytics_readiness
