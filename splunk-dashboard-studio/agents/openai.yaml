interface:
  display_name: "Splunk Platform Dashboard Studio"
  short_description: "Build version=2 dashboards as code and publish via REST"
  default_prompt: >-
    Use $splunk-dashboard-studio to render and validate a Splunk Platform
    Dashboard Studio version=2 dashboard (JSON definition + data/ui/views source
    XML) from SPL panels, then publish it via the data/ui/views REST endpoint.
