connection:
  base_url: https://splunk.example.com:8089
  session_key_env: SPLUNK_SESSION_KEY
  verify_ssl: false
  platform: enterprise

itsi:
  require_present: true
  install_if_missing: true
  source: splunkbase
  app_id: "1841"

content_library:
  require_present: true
  install_if_missing: true
  source: splunkbase
  app_id: "5391"
  refresh_catalog: true

packs:
  - profile: aws
    resolution: skip
    enabled: false
    saved_search_action: disable
    install_all: true
    backfill: false
    prefix: ""
    summary_indexes:
      - summary

  - profile: cisco_data_center
    resolution: skip
    enabled: false
    saved_search_action: disable
    install_all: true
    backfill: false
    prefix: ""

  - profile: cisco_enterprise_networks
    resolution: skip
    enabled: false
    saved_search_action: disable
    install_all: true
    backfill: false
    prefix: ""

  - profile: cisco_thousandeyes
    resolution: skip
    enabled: false
    saved_search_action: disable
    install_all: true
    backfill: false
    prefix: ""
    index_macro_value: index="thousandeyes"

  - profile: linux
    resolution: skip
    enabled: false
    saved_search_action: disable
    install_all: true
    backfill: false
    prefix: ""
    event_indexes:
      - os

  - profile: splunk_appdynamics
    resolution: skip
    enabled: false
    saved_search_action: disable
    install_all: true
    backfill: false
    prefix: ""
    index_macro_value: index="appdynamics"

  - profile: splunk_observability_cloud
    resolution: skip
    enabled: false
    saved_search_action: disable
    install_all: true
    backfill: false
    prefix: ""
    metrics_indexes:
      - sim_metrics
    custom_subdomain: your-observability-subdomain

  - profile: vmware
    resolution: skip
    enabled: false
    saved_search_action: disable
    install_all: true
    backfill: false
    prefix: ""
    metrics_indexes:
      - vmware-perf-metrics

  - profile: windows
    resolution: skip
    enabled: false
    saved_search_action: disable
    install_all: true
    backfill: false
    prefix: ""
    event_indexes:
      - windows
      - perfmon
    metrics_indexes:
      - itsi_im_metrics

  - profile: microsoft_365
    resolution: skip
    enabled: false
    saved_search_action: disable
    install_all: true
    backfill: false
    prefix: ""
    configured_outcome:
      macros:
        - app: DA-ITSI-CP-microsoft-365
          name: itsi-cp-microsoft-365-indexes
          definition: index="o365"
      saved_searches:
        - app: DA-ITSI-CP-microsoft-365
          name: Microsoft 365 Entity Discovery
          enabled: false
      data_model_accelerations:
        - app: DA-ITSI-CP-microsoft-365
          name: Microsoft365
          enabled: true
          earliest_time: -7d
      lookup_updates:
        - title: Refresh Microsoft 365 owner lookup
          app: DA-ITSI-CP-microsoft-365
          search: '| makeresults | eval owner="platform" | outputlookup microsoft_365_owner_lookup.csv'
          allow_dispatch: false
      lookup_file_uploads:
        - title: Replace staged Microsoft 365 owner lookup
          app: DA-ITSI-CP-microsoft-365
          name: microsoft_365_owner_lookup.csv
          staged_path: /opt/splunk/var/run/splunk/lookup_tmp/microsoft_365_owner_lookup.csv
          create: false
          allow_lookup_file_upload: false
          allow_lookup_file_replace: false
      kpi_backfills:
        - title: Backfill Microsoft 365 KPI summaries
          app: DA-ITSI-CP-microsoft-365
          saved_search: Microsoft 365 KPI Summary Backfill
          dispatch.earliest_time: -7d
          dispatch.latest_time: now
          allow_dispatch: false
      service_imports:
        - title: Import Microsoft 365 services
          app: SA-ITOA
          search: '| inputlookup microsoft_365_services.csv | table service_title | itsiimportobjects'
          expected_service_count: 50
          uses_service_templates: false
          allow_service_import: false
      props:
        - app: DA-ITSI-CP-microsoft-365
          stanza: o365:management:activity
          fields:
            KV_MODE: json
      transforms:
        - app: DA-ITSI-CP-microsoft-365
          stanza: o365_extract_example
          REGEX: '"workload":"([^"]+)"'
          FORMAT: workload::$1

  - title: Third-Party APM
    resolution: skip
    enabled: false
    saved_search_action: disable
    install_all: true
    backfill: false
    prefix: ""
