connection:
  base_url: https://splunk.example.com:8089
  username_env: SPLUNK_USERNAME
  password_env: SPLUNK_PASSWORD
  session_key_env: SPLUNK_SESSION_KEY
  verify_ssl: false

defaults:
  sec_grp: default_itsi_security_group

# Optional native apply acceleration for existing keyed objects.
# This batches eligible update payloads through the documented
# itoa_interface/<object_type>/bulk_update route. Creates, special routes,
# and cleanup still use their normal guarded paths.
# bulk_apply:
#   enabled: true
#   sections:
#     - entities
#     - services
#     - kpi_base_searches

