connection:
  base_url: https://splunk.example.com:8089
  session_key_env: SPLUNK_SESSION_KEY
  verify_ssl: false
  platform: enterprise

itsi:
  require_present: true
  install_if_missing: true
  source: splunkbase
  app_id: "1841"

content_library:
  require_present: true
  install_if_missing: true
  source: splunkbase
  app_id: "5391"

defaults:
  sec_grp: default_itsi_security_group

packs:
  - profile: vmware
    resolution: skip
    enabled: false
    saved_search_action: disable
    install_all: true
    backfill: false
    prefix: "Demo - "
    metrics_indexes:
      - vmware-perf-metrics

services:
  - title: Business Platform
    description: Top-level business service managed through the native workflow.
    enabled: false
    kpis:
      - title: Platform Availability
        search: index=platform sourcetype=heartbeat | stats count as availability by host
        threshold_field: availability
        aggregate_statop: avg

topology:
  roots:
    - id: business_platform
      service_ref: Business Platform
      children:
        - id: vmware_cluster
          service:
            title: Demo - VMware Cluster Health
            description: Service instance created or relinked from the VMware pack template.
            enabled: false
          from_template:
            profile: vmware
            title: ESXi Hypervisor
          children:
            - id: shared_db
              service:
                title: Shared Database
                description: Custom downstream dependency managed by the topology workflow.
                enabled: false
                kpis:
                  - title: Availability
                    search: index=database sourcetype=heartbeat | stats count as availability by host
                    threshold_field: availability
                    aggregate_statop: avg
        - id: reporting_api
          service:
            title: Reporting API
            description: Custom API service with an explicit dependency KPI selection.
            enabled: false
            kpis:
              - title: Error Rate
                search: index=api sourcetype=errors | stats sum(errors) as error_rate by host
                threshold_field: error_rate
                aggregate_statop: sum
          children:
            - ref: shared_db
              kpis:
                - Availability

