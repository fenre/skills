interface:
  display_name: "Splunk Add-on for Google Cloud Platform Setup"
  short_description: "Render GCP Cloud Logging -> Pub/Sub inputs, credential runbook, and index"
  default_prompt: >-
    Use $splunk-gcp-ta-setup to render the Splunk_TA_google-cloudplatform
    google_cloud_pubsub input for Cloud Logging/audit ingestion
    (google:gcp:pubsub:message), emit a service-account credential and Pub/Sub
    export runbook, install the add-on, create the gcp index, and validate.
