services:
  redis:
    image: ${REDIS_IMAGE}:${REDIS_TAG}
    container_name: SC4SNMP-redis
    environment:
      # Local-only lab default; set REDIS_PASSWORD for shared/production hosts
      - ALLOW_EMPTY_PASSWORD=yes
    volumes:
      - redis-data:/bitnami/redis/data

  mongo:
    image: ${MONGO_IMAGE}:${MONGO_TAG}
    container_name: SC4SNMP-mongo
    environment:
      # Local-only lab default; set MONGODB_ROOT_PASSWORD for shared/production hosts
      - ALLOW_EMPTY_PASSWORD=yes
    volumes:
      - mongo-data:/bitnami/mongodb

  mibserver:
    image: ${MIBSERVER_IMAGE}:${MIBSERVER_TAG}
    container_name: SC4SNMP-mibserver
    networks:
      default:
        aliases:
          - snmp-mibserver

  inventory:
    image: {{SC4SNMP_IMAGE}}
    container_name: SC4SNMP-inventory
    command: [inventory]
    restart: on-failure
    env_file:
      - .env
    volumes:
      - ./config/inventory.csv:/app/inventory/inventory.csv:ro
      - ./config/scheduler-config.yaml:/app/config/config.yaml:ro
      - ./secrets:/app/secrets/tmp:ro
      - ./mibs:/app/new_mibs/src/vendor:ro
    depends_on:
      - redis
      - mongo
      - mibserver

  scheduler:
    image: {{SC4SNMP_IMAGE}}
    container_name: SC4SNMP-scheduler
    command: [celery, beat]
    restart: on-failure
    env_file:
      - .env
    volumes:
      - ./config/scheduler-config.yaml:/app/config/config.yaml:ro
      - ./secrets:/app/secrets/tmp:ro
      - ./mibs:/app/new_mibs/src/vendor:ro
    depends_on:
      - redis
      - mongo
      - mibserver

  worker-poller:
    image: {{SC4SNMP_IMAGE}}
    container_name: SC4SNMP-worker-poller
    command: [celery, worker-poller]
    restart: on-failure
    env_file:
      - .env
    volumes:
      - ./config/scheduler-config.yaml:/app/config/config.yaml:ro
      - ./secrets:/app/secrets/tmp:ro
      - ./mibs:/app/new_mibs/src/vendor:ro
    depends_on:
      - scheduler

  worker-sender:
    image: {{SC4SNMP_IMAGE}}
    container_name: SC4SNMP-worker-sender
    command: [celery, worker-sender]
    restart: on-failure
    env_file:
      - .env
    volumes:
      - ./config/scheduler-config.yaml:/app/config/config.yaml:ro
      - ./secrets:/app/secrets/tmp:ro
    depends_on:
      - scheduler

  worker-trap:
    image: {{SC4SNMP_IMAGE}}
    container_name: SC4SNMP-worker-trap
    command: [celery, worker-trap]
    restart: on-failure
    env_file:
      - .env
    volumes:
      - ./config/traps-config.yaml:/app/config/config.yaml:ro
      - ./secrets:/app/secrets/tmp:ro
      - ./mibs:/app/new_mibs/src/vendor:ro
    depends_on:
      - scheduler

  trap:
    image: {{SC4SNMP_IMAGE}}
    container_name: SC4SNMP-trap
    command: [trap]
    restart: on-failure
    env_file:
      - .env
    volumes:
      - ./config/traps-config.yaml:/app/config/config.yaml:ro
      - ./secrets:/app/secrets/tmp:ro
      - ./mibs:/app/new_mibs/src/vendor:ro
    depends_on:
      - worker-trap
    ports:
      - target: 2162
        published: {{TRAPS_PORT}}
        protocol: udp

volumes:
  redis-data:
  mongo-data:
