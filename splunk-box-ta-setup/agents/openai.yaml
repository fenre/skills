name: splunk-box-ta-setup
description: Render, install, and validate Splunk_TA_box with safe OAuth account handoffs.
safe_first:
  - bash skills/splunk-box-ta-setup/scripts/setup.sh --help
  - bash skills/splunk-box-ta-setup/scripts/setup.sh --render --dry-run --json
validation:
  - bash skills/splunk-box-ta-setup/scripts/validate.sh --help
notes:
  - Do not pass Box credentials on the command line. Use the rendered account setup runbook.
