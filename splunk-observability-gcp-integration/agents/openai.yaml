interface:
  display_name: "Splunk Observability Cloud <-> GCP Integration"
  short_description: "Render, apply, validate, discover, and diagnose the Splunk Observability Cloud GCP integration end-to-end."
  default_prompt: |
    Use $splunk-observability-gcp-integration to render, validate, apply,
    discover, or diagnose the Splunk Observability Cloud GCP integration:
    polling via Cloud Monitoring API; two authMethod values —
    SERVICE_ACCOUNT_KEY (projectServiceKeys with projectKey write-only,
    redacted on GET, file-based delivery via --key-file) or
    WORKLOAD_IDENTITY_FEDERATION (pool_id, provider_id, splunk_principal
    per realm from wif-splunk-principals.json); pollRate 60–600 s (wire in
    milliseconds); useMetricSourceProjectForQuota (WARN: requires extra IAM
    role); importGCPMetrics; services 32-entry enum (appengine, bigquery,
    bigtable, cloudfunctions, cloudiot, cloudsql, cloudtasks, composer,
    compute, container, containeranalysis, dataflow, dataproc, dialogflow,
    file, firebasedatabase, firebasehosting, firebasestorage, firestore,
    iam, interconnect, knative, loadbalancing, logging, ml, pubsub, redis,
    router, run, spanner, storage, vpn); customMetricTypeDomains;
    excludeGceInstancesWithLabels; namedToken ForceNew warning; Terraform
    signalfx_gcp_integration pinned to splunk-terraform/signalfx ~> 9.0;
    GCloud CLI SA creation + role binding scripts; multi-project support;
    drift detection with credential-hash sidecar (projectKey redacted on
    GET); conflict matrix (SA key vs WIF block, services mode, poll-rate
    bounds); and cross-skill handoffs to splunk-app-install
    (Splunk_TA_google_cloud Splunkbase 3088 logs), splunk-observability-
    otel-collector-setup (GKE host telemetry), splunk-observability-
    dashboard-builder (GCP dashboards), and splunk-observability-native-ops
    (GCP detectors).
