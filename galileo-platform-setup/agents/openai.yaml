interface:
  display_name: "Galileo Platform Setup"
  short_description: "Render Galileo readiness, object lifecycle, full feature coverage, Observe/Protect/Evaluate assets, Splunk handoffs, and O11y-only mode."
  default_prompt: >-
    Use $galileo-platform-setup to render, validate, and optionally apply
    Galileo platform workflows: readiness, project/log stream/dataset/prompt
    and experiment lifecycle provisioning, export_records to Splunk HEC,
    OpenTelemetry/OpenInference runtime snippets, Protect stage/invoke coverage,
    Evaluate metric/annotation handoffs, SSO/RBAC, Luna-2, tags/metadata,
    retention/privacy controls, Agent Graph and console debugging views, MCP
    tool-call logging, cookbook/use-case coverage, async job progress, release
    compatibility checks, Agent Control target resolution, Splunk HEC and OTLP
    handoffs, Splunk OTel Collector handoff, dashboard/detector handoffs, and
    --o11y-only Observability Cloud mode without Splunk Platform HEC.
